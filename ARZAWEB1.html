<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ARZARIOZ - Escuela de Patinaje</title>
  <style>
    /* Estilos generales */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #333;
    }

    header {
      background-color: #000;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
      color: #e50914; /* rojo */
    }

    nav {
      background-color: #111;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      color: #e50914;
    }

    .hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://picsum.photos/1200/400?skating') no-repeat center center;
      background-size: cover;
      color: #fff;
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.2em;
    }

    section {
      padding: 40px 20px;
      text-align: center;
    }

    section h3 {
      color: #e50914;
      margin-bottom: 20px;
    }

    footer {
      background-color: #000;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>ARZARIOZ</h1>
    <p>Escuela de Patinaje</p>
  </header>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Nosotros</a>
    <a href="#">Clases</a>
    <a href="#">Contacto</a>
  </nav>

  <div class="hero">
    <h2>Bienvenidos a ARZARIOZ</h2>
    <p>Formamos campeones sobre ruedas</p>
  </div>

  <section>
    <h3>¿Qué ofrecemos?</h3>
    <p>Entrenamiento profesional en patinaje, programas para todas las edades y un ambiente seguro y motivador.</p>
  </section>

  <footer>

  </footer>

</html>
